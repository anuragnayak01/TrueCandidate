<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sherlock — Candidate Identification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12151c;
    --ink-2:#1b1f29;
    --paper:#efe9db;
    --paper-dim:#c9c0aa;
    --rule:#3a3f4d;
    --gold:#c9a24a;
    --rust:#b3441e;
    --sage:#4a7c72;
    --sage-dim:#2c463f;
    --text:#efe9db;
    --text-dim:#9aa0ad;
    --serif:'Source Serif 4', Georgia, serif;
    --mono:'IBM Plex Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, #1a1f2b 0%, var(--ink) 55%),
      var(--ink);
    color:var(--text);
    font-family:var(--serif);
    min-height:100vh;
    padding:32px 20px 80px;
  }
  ::selection{background:var(--rust); color:var(--paper);}

  .wrap{max-width:1040px; margin:0 auto;}

  /* ---------- Header / case label ---------- */
  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:2px solid var(--gold);
    padding-bottom:18px; margin-bottom:28px;
    flex-wrap:wrap; gap:16px;
  }
  .brand{display:flex; align-items:baseline; gap:14px;}
  .brand h1{
    font-size:30px; letter-spacing:0.5px; font-weight:700;
    font-family:var(--serif);
  }
  .brand .case-tag{
    font-family:var(--mono); font-size:11px; letter-spacing:1.5px;
    color:var(--gold); text-transform:uppercase;
    border:1px solid var(--gold); border-radius:2px;
    padding:3px 8px;
  }
  .status-line{
    font-family:var(--mono); font-size:12px; color:var(--text-dim);
    display:flex; align-items:center; gap:8px;
  }
  .dot{width:8px; height:8px; border-radius:50%; background:var(--rule); display:inline-block; transition:background .3s;}
  .dot.live{background:var(--sage); box-shadow:0 0 8px var(--sage);}
  .dot.err{background:var(--rust); box-shadow:0 0 8px var(--rust);}

  /* ---------- Intake form ---------- */
  .intake{
    background:var(--ink-2); border:1px solid var(--rule); border-radius:6px;
    padding:22px 24px; margin-bottom:32px;
  }
  .intake h2{
    font-family:var(--mono); font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold); margin-bottom:16px; font-weight:600;
  }
  .intake-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
  }
  @media(max-width:640px){ .intake-grid{grid-template-columns:1fr;} }
  .field label{
    display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:1px;
    text-transform:uppercase; color:var(--text-dim); margin-bottom:6px;
  }
  .field input{
    width:100%; background:var(--ink); border:1px solid var(--rule); border-radius:4px;
    padding:9px 11px; color:var(--text); font-family:var(--mono); font-size:13px;
    outline:none; transition:border-color .2s;
  }
  .field input:focus{border-color:var(--gold);}
  .field input::placeholder{color:#555b6b;}
  .intake-actions{
    display:flex; gap:10px; margin-top:18px; align-items:center; flex-wrap:wrap;
  }
  button{
    font-family:var(--mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    font-weight:600; border-radius:4px; border:1px solid transparent; cursor:pointer;
    padding:10px 18px; transition:all .15s;
  }
  .btn-primary{background:var(--gold); color:var(--ink); border-color:var(--gold);}
  .btn-primary:hover{background:#dab766;}
  .btn-primary:disabled{opacity:0.4; cursor:not-allowed;}
  .btn-ghost{background:transparent; color:var(--text-dim); border-color:var(--rule);}
  .btn-ghost:hover{color:var(--text); border-color:var(--text-dim);}
  .intake-note{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-left:auto;}

  /* ---------- Board ---------- */
  .board{display:none;}
  .board.active{display:block;}

  .meta-strip{
    display:flex; gap:28px; flex-wrap:wrap; margin-bottom:26px;
    font-family:var(--mono); font-size:12px; color:var(--text-dim);
  }
  .meta-strip b{color:var(--text); font-weight:600;}

  /* ---------- Identity mismatch banner ----------
     Deliberately its own top-level block, not folded into a dossier card:
     this mirrors the backend's design intent (engine.py's
     _check_identity_mismatch is a hard-triggered flag, separate from the
     blended composite score) — so visually it should read as a distinct
     alert sitting above the case board, not as "one dossier looking worse." */
  .mismatch-banner{
    display:none;
    align-items:flex-start; gap:12px;
    background:rgba(179,68,30,0.16); border:1px solid var(--rust); border-radius:6px;
    padding:14px 18px; margin-bottom:22px;
    animation:mismatch-pulse 1.6s ease-in-out infinite;
  }
  .mismatch-banner.active{display:flex;}
  .mismatch-banner .mm-icon{font-size:20px; line-height:1; flex-shrink:0;}
  .mismatch-banner .mm-body{font-family:var(--mono); font-size:12.5px; color:var(--text); line-height:1.6;}
  .mismatch-banner .mm-title{
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:11px;
    color:var(--rust); display:block; margin-bottom:4px;
  }
  @keyframes mismatch-pulse{
    0%,100%{box-shadow:0 0 0 rgba(179,68,30,0);}
    50%{box-shadow:0 0 18px rgba(179,68,30,0.45);}
  }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-dim);
    font-family:var(--mono); font-size:13px; border:1px dashed var(--rule); border-radius:6px;
  }

  .dossier{
    background:var(--paper); color:#1c1a14; border-radius:6px;
    margin-bottom:22px; overflow:hidden; position:relative;
    box-shadow:0 6px 24px rgba(0,0,0,0.35);
    border-left:5px solid var(--paper-dim);
    transition:border-color .4s;
  }
  .dossier.leading{border-left-color:var(--rust);}
  .dossier.cleared{border-left-color:var(--sage);}

  .dossier-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:20px 24px 14px; gap:16px; flex-wrap:wrap;
  }
  .dossier-id{display:flex; flex-direction:column; gap:4px;}
  .dossier-name{font-size:22px; font-weight:700; font-family:var(--serif);}
  .dossier-sub{font-family:var(--mono); font-size:11px; color:#6b6552; letter-spacing:0.5px;}

  .stamp{
    font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:2px;
    padding:6px 12px; border:2px solid currentColor; border-radius:3px;
    transform:rotate(-4deg); text-transform:uppercase; white-space:nowrap;
  }
  .stamp.candidate{color:var(--rust);}
  .stamp.cleared{color:var(--sage-dim);}
  .stamp.pending{color:#8a8163; border-style:dashed;}

  .score-row{
    padding:0 24px 18px; display:flex; align-items:center; gap:14px;
  }
  .score-bar-track{
    flex:1; height:10px; background:#dcd4bd; border-radius:6px; overflow:hidden;
  }
  .score-bar-fill{
    height:100%; border-radius:6px; transition:width .5s ease, background .5s ease;
  }
  .score-num{font-family:var(--mono); font-weight:700; font-size:14px; min-width:52px; text-align:right;}

  .signals-wrap{border-top:1px solid #d8cfb4; padding:14px 24px 22px;}
  .signals-heading{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase;
    color:#8a8163; margin-bottom:10px; font-weight:600;
  }
  table.signal-table{width:100%; border-collapse:collapse; font-family:var(--mono);}
  .signal-table thead th{
    text-align:left; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:#8a8163; font-weight:600; padding:0 10px 8px 0; border-bottom:1px solid #d8cfb4;
  }
  .signal-table thead th.num{text-align:right;}
  .signal-table tbody td{
    padding:9px 10px 9px 0; border-bottom:1px solid #e9e2cc; vertical-align:top; font-size:12px;
  }
  .signal-table tbody tr:last-child td{border-bottom:none;}
  .signal-table td.num{text-align:right; font-weight:600; white-space:nowrap;}
  .signal-name{color:#2c2a20; font-weight:700; white-space:nowrap;}
  .signal-reason-cell{color:#6b6552; line-height:1.5;}

  footer{
    text-align:center; margin-top:40px; font-family:var(--mono); font-size:11px; color:#4d5262;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>Sherlock</h1>
      <span class="case-tag">Candidate Identification</span>
    </div>
    <div class="status-line"><span class="dot" id="statusDot"></span><span id="statusText">Awaiting case file</span></div>
  </header>

  <div class="intake" id="newCase">
    <h2>New Case Intake</h2>
    <div class="intake-grid">
      <div class="field">
        <label for="ic_meetingId">Zoom Meeting ID</label>
        <input id="ic_meetingId" type="text" placeholder="Must match the real Zoom meeting ID — webhook events are routed by this ID" />
      </div>
      <div class="field">
        <label for="ic_candidateName">Candidate Name *</label>
        <input id="ic_candidateName" type="text" placeholder="e.g. Sarah Chen" />
      </div>
      <div class="field">
        <label for="ic_candidateEmail">Candidate Email *</label>
        <input id="ic_candidateEmail" type="email" placeholder="sarah.chen@gmail.com" />
      </div>
      <div class="field">
        <label for="ic_jobTitle">Job Title</label>
        <input id="ic_jobTitle" type="text" placeholder="e.g. Senior ML Engineer" />
      </div>
      <div class="field">
        <label for="ic_company">Company</label>
        <input id="ic_company" type="text" placeholder="e.g. Acme Corp" />
      </div>
      <div class="field">
        <label for="ic_interviewerNames">Interviewer Name(s)</label>
        <input id="ic_interviewerNames" type="text" placeholder="Comma-separated: Alex Rivera, Jordan Kim" />
      </div>
      <div class="field">
        <label for="ic_interviewerEmails">Interviewer Email(s)</label>
        <input id="ic_interviewerEmails" type="text" placeholder="Comma-separated: alex@acme.com, jordan@acme.com" />
      </div>
      <div class="field">
        <label for="ic_photo">Candidate Photo (face enrollment)</label>
        <input id="ic_photo" type="file" accept="image/*" />
      </div>
      <div class="field">
        <label for="ic_audio">Candidate Voice Clip — ~20s (voice enrollment)</label>
        <input id="ic_audio" type="file" accept="audio/*" />
      </div>
    </div>
    <div class="intake-actions">
      <button class="btn-primary" id="createCaseBtn">Create Case File</button>
      <span class="intake-note" id="createCaseNote"></span>
    </div>
    <div class="intake-note" id="enrollResult" style="margin-top:10px;"></div>
  </div>

  <div class="intake" id="intake">
    <h2>Open Case File</h2>
    <div class="intake-grid">
      <div class="field">
        <label for="apiBase">Backend URL</label>
        <input id="apiBase" type="text" value="https://truecandidate.onrender.com" placeholder="https://your-backend.onrender.com" />
      </div>
      <div class="field">
        <label for="meetingId">Meeting ID</label>
        <input id="meetingId" type="text" placeholder="e.g. 9763851399" />
      </div>
    </div>
    <div class="intake-actions">
      <button class="btn-primary" id="connectBtn">Open Case</button>
    
      <button class="btn-ghost" id="closeMeetingBtn">
        Close Meeting
      </button>
    
      <button class="btn-ghost" id="disconnectBtn" style="display:none;">
        Disconnect
      </button>
    
      <span class="intake-note" id="intakeNote"></span>
    </div>
  </div>

  <div class="board" id="board">
    <div class="meta-strip" id="metaStrip"></div>
    <div class="mismatch-banner" id="mismatchBanner">
      <span class="mm-icon">🚨</span>
      <div class="mm-body">
        <span class="mm-title">Identity Mismatch</span>
        <span id="mismatchText"></span>
      </div>
    </div>
    <div id="dossierList"></div>
  </div>

  <footer>Live evidence stream via WebSocket — signals update as participants act</footer>
</div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const statusDot = $('statusDot');
  const statusText = $('statusText');
  const intakeNote = $('intakeNote');
  const connectBtn = $('connectBtn');
  const disconnectBtn = $('disconnectBtn');
  const closeMeetingBtn = $('closeMeetingBtn');
  const board = $('board');
  const metaStrip = $('metaStrip');
  const dossierList = $('dossierList');
  const mismatchBanner = $('mismatchBanner');
  const mismatchText = $('mismatchText');

  // New Case Intake form elements
  const createCaseBtn = $('createCaseBtn');
  const createCaseNote = $('createCaseNote');
  const enrollResult = $('enrollResult');

  // Restore last-used values for convenience
  try{
    const savedBase = localStorage.getItem('sherlock_api_base');
    const savedMeeting = localStorage.getItem('sherlock_meeting_id');
    if(savedBase) $('apiBase').value = savedBase;
    if(savedMeeting) $('meetingId').value = savedMeeting;
  }catch(e){}

  let ws = null;
  let currentMeetingId = null;
  let currentContext = null;
  let currentState = { participants: {}, event_count: 0 };
  // Latest IdentificationResult, tracked separately from currentState since
  // engine.get_state() (which currentState mirrors) does not carry
  // identity_mismatch — that only comes through on the "identification"
  // field of each meeting_event WS message / the initial snapshot fetch.
  let currentIdentification = null;

  // Full 9-signal order, weight-descending — matches backend/models.py
  // SIGNAL_WEIGHTS exactly. Previously only had the original 7 signals,
  // which silently hid face_match/voice_match (the two highest-weighted
  // signals, 35%+22% of the composite score) from this dashboard even
  // though the backend was computing them the whole time.
  const SIGNAL_ORDER = [
    'face_match','voice_match','email_match','interviewer_exclusion',
    'name_match','speaking_pattern','transcript_language','join_order','screen_share'
  ];

  function setStatus(mode, text){
    statusDot.className = 'dot' + (mode ? ' ' + mode : '');
    statusText.textContent = text;
  }

  function httpBase(){
    return $('apiBase').value.trim().replace(/\/$/, '');
  }
  function wsBase(){
    return httpBase().replace(/^http/, 'ws');
  }

  async function fetchState(meetingId){
    const res = await fetch(`${httpBase()}/api/meeting/${encodeURIComponent(meetingId)}`);
    if(!res.ok){
      throw new Error(res.status === 404 ? 'No case file found for that meeting ID yet.' : `Server returned ${res.status}`);
    }
    return res.json();
  }

  function connectSocket(meetingId){
    const url = `${wsBase()}/ws/${encodeURIComponent(meetingId)}`;
    ws = new WebSocket(url);

    ws.onopen = () => setStatus('live', 'Live — receiving evidence');
    ws.onerror = () => setStatus('err', 'Connection error');
    ws.onclose = () => setStatus('', 'Disconnected');

    ws.onmessage = (evt) => {
      let msg;
      try{ msg = JSON.parse(evt.data); }catch(e){ return; }

      if(msg.type === 'connected'){
        currentContext = msg.context;
        currentState = msg.state || currentState;
        renderAll();
      } else if(msg.type === 'meeting_event'){
        currentState = msg.state || currentState;
        if(msg.identification) currentIdentification = msg.identification;
        renderAll();
      } else if(msg.type === 'error'){
        setStatus('err', msg.message || 'Server error');
      } else if(msg.type === 'scenario_complete'){
        setStatus('live', 'Scenario complete — case remains open');
      }
    };
  }

  async function openCase(){
    const meetingId = $('meetingId').value.trim();
    if(!meetingId){
      intakeNote.textContent = 'Enter a meeting ID first.';
      return;
    }
    try{ localStorage.setItem('sherlock_api_base', httpBase()); localStorage.setItem('sherlock_meeting_id', meetingId); }catch(e){}

    connectBtn.disabled = true;
    intakeNote.textContent = 'Opening case file…';
    setStatus('', 'Connecting…');

    try{
      const data = await fetchState(meetingId);
      currentContext = data.context;
      currentState = data.state;
      // Best-effort: the snapshot endpoint may nest identification under
      // `identification`, or may not include it at all yet (if no events
      // have fired). Either way this degrades gracefully — the banner
      // simply stays hidden until the first WS meeting_event arrives.
      currentIdentification = data.identification || null;
      currentMeetingId = meetingId;

      board.classList.add('active');
      disconnectBtn.style.display = 'inline-block';
      intakeNote.textContent = '';
      renderAll();
      connectSocket(meetingId);
    }catch(err){
      intakeNote.textContent = err.message || 'Could not open case file.';
      setStatus('err', 'Failed to load');
    }finally{
      connectBtn.disabled = false;
    }
  }

  function closeCase(){
    if(ws){ ws.close(); ws = null; }
    currentMeetingId = null;
    currentIdentification = null;
    board.classList.remove('active');
    disconnectBtn.style.display = 'none';
    setStatus('', 'Awaiting case file');
  }
  async function closeMeeting(){

    const meetingId = $('meetingId').value.trim();

    if(!meetingId){
        intakeNote.textContent = "Enter meeting ID first.";
        return;
    }


    try{

        closeMeetingBtn.disabled = true;
        intakeNote.textContent = "Closing meeting...";


        const res = await fetch(
          `${httpBase()}/api/meeting/${encodeURIComponent(meetingId)}/end`,
          {
            method:"POST"
          }
        );


        if(!res.ok){
            throw new Error(
              `Server returned ${res.status}`
            );
        }


        const data = await res.json();


        intakeNote.textContent =
          `Meeting closed successfully (${data.meeting_id})`;


        setStatus(
          '',
          'Meeting completed'
        );


        if(ws){
            ws.close();
            ws=null;
        }


    }
    catch(err){

        intakeNote.textContent =
          err.message || "Failed to close meeting";

        setStatus(
          'err',
          'Close failed'
        );

    }
    finally{

        closeMeetingBtn.disabled=false;

    }

}
  // ------------------------------------------------------------------
  // New Case Intake
  // ------------------------------------------------------------------

  function splitList(str){
    return str.split(',').map(s => s.trim()).filter(Boolean);
  }

  // Reads a File and resolves to raw base64 (the data: URL prefix stripped —
  // the backend's photo_b64/audio_b64 fields expect just the base64 body,
  // matching how EnrollRequest / api_enroll_biometrics decode it).
  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result || '';
        const commaIdx = result.indexOf(',');
        resolve(commaIdx >= 0 ? result.slice(commaIdx + 1) : result);
      };
      reader.onerror = () => reject(new Error('Could not read file'));
      reader.readAsDataURL(file);
    });
  }

  async function createCase(){
    const meetingIdInput = $('ic_meetingId').value.trim();
    const candidateName = $('ic_candidateName').value.trim();
    const candidateEmail = $('ic_candidateEmail').value.trim();
    const jobTitle = $('ic_jobTitle').value.trim();
    const company = $('ic_company').value.trim();
    const interviewerNames = splitList($('ic_interviewerNames').value);
    const interviewerEmails = splitList($('ic_interviewerEmails').value);
    const photoFile = $('ic_photo').files[0] || null;
    const audioFile = $('ic_audio').files[0] || null;

    if(!candidateName || !candidateEmail){
      createCaseNote.textContent = 'Candidate name and email are required.';
      return;
    }

    createCaseBtn.disabled = true;
    createCaseNote.textContent = 'Creating case file…';
    enrollResult.textContent = '';

    try{
      // Step 1: create the meeting/case context.
      // NOTE: if this candidate is being interviewed over real Zoom, the
      // meeting ID here MUST match the Zoom meeting ID your webhook will
      // send events for — that's how incoming webhook events get routed to
      // this session. Leave it blank only for testing / non-Zoom flows,
      // since the backend will generate a random ID that Zoom's webhook
      // will never actually reference.
      const payload = {
        candidate_name: candidateName,
        candidate_email: candidateEmail,
        interviewer_names: interviewerNames,
        interviewer_emails: interviewerEmails,
        job_title: jobTitle,
        company: company,
      };
      if(meetingIdInput) payload.meeting_id = meetingIdInput;

      const res = await fetch(`${httpBase()}/api/meeting/live`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      if(!res.ok) throw new Error(`Server returned ${res.status} while creating the case`);
      const data = await res.json();
      const newMeetingId = data.meeting_id;

      // Step 2: biometric enrollment, only if a photo and/or audio file was
      // provided — both are optional. Uses the existing single-shot
      // /enroll endpoint (validates + extracts + discards raw bytes
      // server-side; see api_enroll_biometrics docstring in server.py).
      if(photoFile || audioFile){
        createCaseNote.textContent = 'Case created — enrolling biometrics…';
        const enrollPayload = {};
        if(photoFile) enrollPayload.photo_b64 = await fileToBase64(photoFile);
        if(audioFile) enrollPayload.audio_b64 = await fileToBase64(audioFile);

        const enrollRes = await fetch(`${httpBase()}/api/meeting/${encodeURIComponent(newMeetingId)}/enroll`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(enrollPayload),
        });
        const enrollData = await enrollRes.json();

        const parts = [];
        parts.push(enrollData.face_enrolled ? '✅ Face enrolled' : (photoFile ? '⚠️ Face NOT enrolled' : ''));
        parts.push(enrollData.voice_enrolled ? '✅ Voice enrolled' : (audioFile ? '⚠️ Voice NOT enrolled' : ''));
        if(Array.isArray(enrollData.errors) && enrollData.errors.length){
          parts.push(...enrollData.errors.map(e => '⚠️ ' + e));
        }
        enrollResult.textContent = parts.filter(Boolean).join('  ·  ');
      }

      createCaseNote.textContent = `Case created — Meeting ID: ${newMeetingId}`;

      // Convenience: carry the new meeting ID straight into the "Open Case
      // File" form below so the recruiter can immediately start tracking
      // it, without retyping anything.
      $('meetingId').value = newMeetingId;
      try{ localStorage.setItem('sherlock_meeting_id', newMeetingId); }catch(e){}
    }catch(err){
      createCaseNote.textContent = err.message || 'Could not create case file.';
    }finally{
      createCaseBtn.disabled = false;
    }
  }

  function renderAll(){
    if(!currentContext) return;

    const ctx = currentContext;
    metaStrip.innerHTML = `
      <div>Candidate: <b>${escapeHtml(ctx.candidate_name || '—')}</b></div>
      <div>Role: <b>${escapeHtml(ctx.job_title || '—')}</b></div>
      <div>Meeting ID: <b>${escapeHtml(ctx.meeting_id || currentMeetingId)}</b></div>
      <div>Events observed: <b>${currentState.event_count ?? 0}</b></div>
    `;

    // Identity mismatch — hard-triggered alert, rendered independently of
    // the per-participant dossier cards below it (see .mismatch-banner
    // comment in <style> for why it's not folded into a dossier).
    if(currentIdentification && currentIdentification.identity_mismatch){
      mismatchText.textContent = currentIdentification.identity_mismatch_reason || 'Face and voice biometrics disagree for a participant.';
      mismatchBanner.classList.add('active');
    } else {
      mismatchBanner.classList.remove('active');
    }

    const participants = Object.values(currentState.participants || {});
    if(participants.length === 0){
      dossierList.innerHTML = `<div class="empty-state">No participants have joined yet. Dossiers will appear here as evidence arrives.</div>`;
      return;
    }

    participants.sort((a,b) => (b.composite_score||0) - (a.composite_score||0));
    const topScore = participants[0].composite_score || 0;

    dossierList.innerHTML = participants.map((p, idx) => renderDossier(p, idx === 0 && topScore >= 0.6)).join('');
  }

  function renderDossier(p){
    const score = p.composite_score ?? 0.5;
    const pct = Math.round(score * 100);
    let cls = '', stampHtml = '';

    if(score >= 0.7){
      cls = 'leading';
      stampHtml = `<div class="stamp candidate">Likely Candidate</div>`;
    } else if(score <= 0.3){
      cls = 'cleared';
      stampHtml = `<div class="stamp cleared">Likely Interviewer</div>`;
    } else {
      stampHtml = `<div class="stamp pending">Under Review</div>`;
    }

    const barColor = score >= 0.7 ? 'var(--rust)' : (score <= 0.3 ? 'var(--sage)' : 'var(--gold)');

    const rows = SIGNAL_ORDER
      .filter(k => p.signals && p.signals[k])
      .map(k => {
        const s = p.signals[k];
        return `
          <tr>
            <td class="signal-name">${escapeHtml(s.label)}</td>
            <td class="num">${s.score.toFixed(2)}</td>
            <td class="num">${(s.signal_confidence ?? 0).toFixed(2)}</td>
            <td class="num">${(s.weight ?? 0).toFixed(2)}</td>
            <td class="num">${(s.effective_weight ?? 0).toFixed(3)}</td>
            <td class="signal-reason-cell">${escapeHtml(s.reason)}</td>
          </tr>
        `;
      }).join('');

    return `
      <div class="dossier ${cls}">
        <div class="dossier-top">
          <div class="dossier-id">
            <div class="dossier-name">${escapeHtml(p.display_name || 'Unknown')}</div>
            <div class="dossier-sub">ID ${escapeHtml(p.participant_id)} · joined position #${p.join_order} ${p.email ? '· ' + escapeHtml(p.email) : ''}</div>
          </div>
          ${stampHtml}
        </div>
        <div class="score-row">
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%; background:${barColor};"></div></div>
          <div class="score-num">${pct}%</div>
        </div>
        <div class="signals-wrap">
          <div class="signals-heading">Evidence breakdown — ${SIGNAL_ORDER.filter(k=>p.signals&&p.signals[k]).length} signals</div>
          <table class="signal-table">
            <thead>
              <tr>
                <th>Signal</th>
                <th class="num">Score</th>
                <th class="num">Confidence</th>
                <th class="num">Weight</th>
                <th class="num">Effective</th>
                <th>Reason</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  function escapeHtml(str){
    if(str === null || str === undefined) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  createCaseBtn.addEventListener('click', createCase);
  connectBtn.addEventListener('click', openCase);
  closeMeetingBtn.addEventListener(
      'click',
      closeMeeting
  );
  disconnectBtn.addEventListener('click', closeCase);
  $('meetingId').addEventListener('keydown', (e) => { if(e.key === 'Enter') openCase(); });
})();
</script>
</body>
</html>

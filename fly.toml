# fly.toml — Fly.io deployment config (free hobby tier)
# Free tier: 3 shared VMs, 256MB RAM each, 160GB outbound/month

app = "sherlock-candidate-id"
primary_region = "sin"   # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https   = true          # Free HTTPS/WSS — no cert needed
  auto_stop_machines  = false   # Keep alive for WebSocket connections
  auto_start_machines = true

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# Health check
[[services.tcp_checks]]
  interval    = "15s"
  timeout     = "2s"
  grace_period = "5s"
